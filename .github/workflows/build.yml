name: Build Cross-Platform Binaries

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: chkobba-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: chkobba-windows.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    # On Linux, we need ALSA development libraries so rodio can compile its backend
    - name: Install Linux Audio Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev

    - name: Build Release Binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          target/${{ matrix.target }}/release/chkobba
          target/${{ matrix.target }}/release/chkobba.exe